<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Spam Detector</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background: #0a0e27;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            min-height:100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            z-index: -2;
        }

        /* Email Icons floating animation */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 10%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(240, 147, 251, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 70%, rgba(79, 172, 254, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.15) 0%, transparent 50%);
            background-size: 200% 200%;
            animation: emailFlow 20s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes emailFlow {
            0% { 
                opacity: 0.3;
                transform: translateY(0) translateX(0);
            }
            25% {
                opacity: 0.5;
                transform: translateY(-50px) translateX(50px);
            }
            50% {
                opacity: 0.4;
                transform: translateY(-100px) translateX(0);
            }
            75% {
                opacity: 0.5;
                transform: translateY(-50px) translateX(-50px);
            }
            100% {
                opacity: 0.3;
                transform: translateY(0) translateX(0);
            }
        }

        /* Floating email elements */
        .email-float {
            position: fixed;
            font-size: 80px;
            opacity: 0.5;
            z-index: -1;
            pointer-events: none;
            animation: float linear infinite;
        }

        .email-float:nth-child(1) {
            top: 10%;
            left: 5%;
            animation: float 20s linear infinite;
            color: #667eea;
        }

        .email-float:nth-child(2) {
            top: 20%;
            right: 10%;
            animation: float 25s linear infinite reverse;
            color: #764ba2;
            font-size: 100px;
        }

        .email-float:nth-child(3) {
            bottom: 20%;
            left: 10%;
            animation: float 30s linear infinite;
            color: #f093fb;
            font-size: 90px;
        }

        .email-float:nth-child(4) {
            top: 30%;
            right: 5%;
            animation: float 28s linear infinite reverse;
            color: #4facfe;
            font-size: 110px;
        }

        .email-float:nth-child(5) {
            bottom: 10%;
            right: 15%;
            animation: float 22s linear infinite;
            color: #00f2fe;
            font-size: 85px;
        }

        .email-float:nth-child(6) {
            top: 50%;
            left: 15%;
            animation: float 26s linear infinite reverse;
            color: #667eea;
            font-size: 95px;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            25% {
                transform: translateY(-30px) translateX(20px) rotate(10deg);
            }
            50% {
                transform: translateY(-60px) translateX(0) rotate(0deg);
            }
            75% {
                transform: translateY(-30px) translateX(-20px) rotate(-10deg);
            }
            100% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
        }

        .card{
            width:450px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            padding:40px;
            border-radius:25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            color:lightgray;
            border: 1px solid rgba(255,255,255,0.18);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .card:hover{
            transform: translateY(-10px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            font-size:28px;
            font-weight:700;
            background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }
        h3{
            font-size: 22px;
            color: rgba(255,255,255,0.9);
        }

        textarea{
            width:100%;
            height:180px;
            border:2px solid rgba(255,255,255,0.2);
            outline:none;
            padding:18px;
            border-radius:15px;
            resize:none;
            font-size:15px;
            background: rgba(255,255,255,0.08);
            color: white;
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        textarea::placeholder{
            color: rgba(255,255,255,0.6);
        }

        textarea:focus{
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        button{
            width:100%;
            margin-top:25px;
            padding:16px;
            border:none;
            border-radius:12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color:white;
            font-size:25px;
            cursor:pointer;
            font-weight:800;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover{
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        button:active{
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .result {
    margin-top: 30px;
    text-align: center;

    font-size: 25px;              /* Bigger text */
    font-weight: 650;             /* More bold */
    color: white;               /* Bright text */

    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;

    background: linear-gradient(135deg, rgba(0, 255, 150, 0.15), rgba(0, 140, 255, 0.15));
    padding: 24px;

    border-radius: 18px;
    border: 2px solid rgba(255,255,255,0.25);

    box-shadow: 
        0 8px 25px rgba(0,0,0,0.25),
        0 0 15px rgba(0,255,150,0.25);

    letter-spacing: 0.5px;

    animation: slideIn 0.4s ease;
    transition: all 0.3s ease;
}

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="email-float">📧</div>
<div class="email-float">✉️</div>
<div class="email-float">📨</div>
<div class="email-float">💌</div>
<div class="email-float">📬</div>
<div class="email-float">📮</div>

<div class="card">
    <h1>📧 Email Spam Detector</h1>
    <h3 >By Nagendra Singh Choudhary</h3>
    <textarea id="emailText" placeholder="Paste your email content here..."></textarea>
    <button onclick="predictSpam()">Predict</button>
    <div class="result" id="result"></div>
</div>

<script>
async function predictSpam(){
    const email = document.getElementById('emailText').value;

    const response = await fetch('/predict',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({email})
    });

    const data = await response.json();
    document.getElementById('result').innerText = data.prediction;
}
</script>

</body>
</html>
